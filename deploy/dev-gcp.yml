apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: spanner
  namespace: tbd
  labels:
    team: tbd
spec:
  image: {{image}}
  port: 8080
  ingresses:
    - https://spanner.intern.dev.nav.no
    - https://spanner.ansatt.dev.nav.no
  liveness:
    initialDelay: 10
    path: internal/isalive
  readiness:
    initialDelay: 10
    path: internal/isready
  replicas:
    cpuThresholdPercentage: 90
    max: 1
    min: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 64Mi
  azure:
    sidecar:
      enabled: true
      autoLogin: true
      autoLoginIgnorePaths:
        - /assets/**
    application:
      tenant: trygdeetaten.no
      enabled: true
      claims:
        extra:
          - "NAVident"
        groups:
          - id: "9046ac9d-bb00-47dc-bcfb-e5221bf8d7f9" # tbd-dev
      allowAllUsers: false
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: speed-api-dev-proxy
        - application: spleis-api
        - application: sparsom-api
        - application: spurtedu
        - application: spiskammerset
  env:
    - name: DEVELOPMENT
      value: "false"
    - name: SPLEIS_SCOPE
      value: api://dev-gcp.tbd.spleis-api/.default
    - name: SPARSOM_SCOPE
      value: api://dev-gcp.tbd.sparsom-api/.default
    - name: SPISKAMMERSET_SCOPE
      value: api://dev-gcp.tbd.spiskammerset/.default
    - name: HTTP_PORT
      value: "8080"
    - name: HTTP_HOST
      value: spanner.ansatt.dev.nav.no
    - name: SPLEIS_API_URL
      value: http://spleis-api
    - name: SPARSOM_API_URL
      value: http://sparsom-api
    - name: SPURTE_DU_TILGANG
      value: "9046ac9d-bb00-47dc-bcfb-e5221bf8d7f9"
    - name: SPEED_API_URL
      value: http://speed-api-dev-proxy
    - name: TOKEN_ENDPOINT_ENV_KEY
      value: SPEED_API_DEV_PROXY_TOKEN_ENDPOINT
    - name: SPEED_API_DEV_PROXY_TOKEN_ENDPOINT
      value: http://speed-api-dev-proxy/token
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
